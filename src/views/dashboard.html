<!DOCTYPE html>
<html lang="en">
<head>
<title>DevOps Dashboard Feature</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 10px;
    position: sticky;
    top: 0;
}

.navbar button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #ffffff;
    color: #000000;
}

.navbar button:hover {
    background: #00c6ff;
    color: #ffffff;
}

.container {
    margin-top: 40px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
}

h1 {
    font-size: 24px;
}

.info {
    margin: 12px 0;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.25);
}

button {
    margin: 10px 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.load10 {
    background: #00c6ff;
    color: #000;
}

.load30 {
    background: #ff6a00;
    color: #000;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="navbar">
    <button onclick="location.href='/'">Home</button>
    <button onclick="location.href='/health'">Health</button>
    <button onclick="location.href='/api/version'">Version</button>
    <button onclick="location.href='/api/config'">Config</button>
    <button onclick="location.href='/api/load?duration=10'">Load 10s</button>
    <button onclick="location.href='/api/load?duration=30'">Load 30s</button>
    <button onclick="location.href='/metrics'">Metrics</button>
</div>

<div class="container">

    <h1>🚀 DevOps Dashboard</h1>

    <div class="info">
        Version: <h3 id="version">Loading...</h3>
    </div>

    <div class="info">
        Pod: <h3 id="hostname">Loading...</h3>
    </div>

    <div class="info">
        Environment: <h3 id="environment">Loading...</h3>
    </div>

    <button class="load10" onclick="window.open('/api/load?duration=10')">
        10s Load
    </button>

    <button class="load30" onclick="window.open('/api/load?duration=30')">
        30s Load
    </button>

</div>

<script>
fetch('/api/version')
.then(r => r.json())
.then(d => document.getElementById('version').innerText = d.version);

fetch('/api/config')
.then(r => r.json())
.then(d => document.getElementById('environment').innerText = d.environment);

document.getElementById('hostname').innerText =
    globalThis.location.hostname;
</script>

</body>
</html>
