<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Dashboard Feature</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e3c72;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    width: 100%;
    background: #111;
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.navbar button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #ffffff;
    color: #000000;
}

.navbar button:hover {
    background: #00c6ff;
    color: #fff;
}

/* Main container */
.container {
    margin-top: 40px;
    background: #2a5298;
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
}

/* Info */
.info {
    margin: 12px 0;
    padding: 10px;
    border-radius: 10px;
    background: #ffffff;
    color: #000000;
}

/* Buttons */
button {
    margin: 10px 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.load10 {
    background: #00c6ff;
    color: #000;
}

.load30 {
    background: #ff6a00;
    color: #000;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button onclick="location.href='/'">Home</button>
    <button onclick="location.href='/health'">Health</button>
    <button onclick="location.href='/api/version'">Version</button>
    <button onclick="location.href='/api/config'">Config</button>
    <button onclick="location.href='/metrics'">Metrics</button>
</div>

<!-- DASHBOARD -->
<div class="container">

    <h1>DevOps Dashboard</h1>

    <div class="info">
        Version: <h3 id="version">Loading...</h3>
    </div>

    <div class="info">
        Pod: <h3 id="hostname">Loading...</h3>
    </div>

    <div class="info">
        Environment: <h3 id="environment">Loading...</h3>
    </div>

    <button class="load10" onclick="window.open('/api/load?duration=10')">
        Generate 10s Load
    </button>

    <button class="load30" onclick="window.open('/api/load?duration=30')">
        Generate 30s Load
    </button>

</div>

<script>
fetch('/api/version')
.then(r => r.json())
.then(d => {
    document.getElementById('version').innerText = d.version;
});

fetch('/api/config')
.then(r => r.json())
.then(d => {
    document.getElementById('environment').innerText = d.environment;
});

document.getElementById('hostname').innerText = window.location.hostname;
</script>

</body>
</html>
