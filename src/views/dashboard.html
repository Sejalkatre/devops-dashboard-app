<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>

    <style>
        /* Main container */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background: #222;
            padding: 10px;
        }

        .navbar button {
            background: #444;
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }

        /* FIXED: improved contrast */
        .navbar button:hover {
            background: #003049;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <button>Home</button>
        <button>Dashboard</button>
    </div>

    <h1>DevOps Dashboard</h1>

    <p>Hostname: <span id="hostname"></span></p>

    <script>
        // FIXED: replaced window with globalThis
        document.getElementById('hostname').innerText =
            globalThis.location.hostname;
    </script>

</body>
</html>
